name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
    test-backend:
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                java-version: '21'
                distribution: 'temurin'

            - name: Build and test with Maven
              working-directory: ./backend
              run: mvn -B clean verify

    test-sonar:
        needs: test-backend
        runs-on: ubuntu-24.04
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
    
            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                java-version: '21'
                distribution: 'temurin'
    
            - name: SonarCloud analysis
              working-directory: ./backend  
              run: mvn -B verify sonar:sonar -Dsonar.projectKey=nyvlemyt_DevOps-MlOps -Dsonar.organization=nyvlem -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }}